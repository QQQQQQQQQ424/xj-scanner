{% extends "base.html" %}
{% block title %}新建扫描 - BlackBox Scanner{% endblock %}
{% block page_title %}新建扫描任务{% endblock %}

{% block content %}
<div class="card">
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label>目标 IP / 域名</label>
            <input type="text" name="target"
                   placeholder="例如: 192.168.1.1 或 example.com"
                   value="{{ request.form.get('target', '') }}" required>
            <small>支持单个 IP 地址或域名</small>
        </div>

        <div class="form-group">
            <label>扫描类型</label>
            <select name="scan_type">
                <option value="full">完整扫描 (Nmap + Nuclei)</option>
                <option value="quick">快速扫描 (仅 Nuclei)</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">开始扫描</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>
{% endblock %}
